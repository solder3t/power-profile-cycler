name: Release Extension

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: Create or update a GitHub release after build
        required: false
        default: false
        type: boolean
      tag_name:
        description: Existing tag to release when running manually
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch' && inputs.tag_name != ''
        run: |
          git fetch origin "refs/tags/${{ inputs.tag_name }}:refs/tags/${{ inputs.tag_name }}"
          git checkout "refs/tags/${{ inputs.tag_name }}"

      - name: Install GNOME extension tools
        run: sudo apt-get update && sudo apt-get install -y gnome-shell

      - name: Build extension zip
        run: ./scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: power-profile-cycler-shell-extension
          path: dist/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release && inputs.tag_name != '')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download built extension
        uses: actions/download-artifact@v7
        with:
          name: power-profile-cycler-shell-extension
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          body: |
            Install the attached `power-profile-cycler@solder3t.shell-extension.zip` file directly with GNOME Extensions.

            Do not use GitHub's auto-generated `Source code (zip)` or `Source code (tar.gz)` archives for installation.
          files: dist/*.zip
